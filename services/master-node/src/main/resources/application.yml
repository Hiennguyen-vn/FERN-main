server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: master-node
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

info:
  service:
    name: ${spring.application.name}
    description: Control-plane and orchestration bootstrap service.

dependencies:
  postgres:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fern}
    username: ${POSTGRES_USER:fern}
    password: ${POSTGRES_PASSWORD:fern}
    poolSize: ${DB_POOL_SIZE:16}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  kafka:
    bootstrap: ${KAFKA_BOOTSTRAP:localhost:9092}

fern:
  control:
    heartbeatLeaseSeconds: ${CONTROL_HEARTBEAT_LEASE_SECONDS:30}
    heartbeatIntervalSeconds: ${CONTROL_HEARTBEAT_INTERVAL_SECONDS:10}
