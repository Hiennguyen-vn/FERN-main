      <<: *service-env
      SERVER_PORT: 8092
      DB_REPLICA_URL: jdbc:postgresql://postgres-replica:5432/${POSTGRES_DB:-fern}
    depends_on:
      master-node:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
    ports:
      - "127.0.0.1:${REPORT_SERVICE_PORT:-8092}:8092"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8092/actuator/health | grep UP >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:11-alpine
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fern}
      FLYWAY_USER: ${POSTGRES_USER:-fern}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-fern}
      FLYWAY_DEFAULT_SCHEMA: ${POSTGRES_SCHEMA:-core}
      FLYWAY_SCHEMAS: ${POSTGRES_SCHEMA:-core}
      FLYWAY_LOCATIONS: filesystem:/workspace/db/migrations
    volumes:
      - ../db:/workspace/db:ro
      - ../db/flyway.conf:/flyway/conf/flyway.conf:ro

  db-tools:
    image: postgres:16-alpine
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-fern}
      PGUSER: ${POSTGRES_USER:-fern}
      PGPASSWORD: ${POSTGRES_PASSWORD:-fern}
    working_dir: /workspace
    volumes:
      - ../db:/workspace/db:rw

volumes:
  postgres-primary-data:
  postgres-replica-data:
  redis-data:
  kafka-data:
