services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fern}
      POSTGRES_USER: ${POSTGRES_USER:-fern}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fern}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-repl_user}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-repl_pass}
      POSTGRES_REPLICATION_SLOT: ${POSTGRES_REPLICATION_SLOT:-fern_replica_slot}
      POSTGRES_REPLICA_FORCE_RESEED: ${POSTGRES_REPLICA_FORCE_RESEED:-false}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./postgres/primary/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c config_file=/etc/postgresql/postgresql.conf
        -c hba_file=/etc/postgresql/pg_hba.conf
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-fern} -d ${POSTGRES_DB:-fern} >/dev/null 2>&1 && psql -U ${POSTGRES_USER:-fern} -d ${POSTGRES_DB:-fern} -Atqc \"SELECT CASE WHEN pg_is_in_recovery() THEN 'not-primary' ELSE 'primary' END\" | grep '^primary$' >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-replica:
    image: postgres:16-bookworm
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fern}
      POSTGRES_USER: ${POSTGRES_USER:-fern}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fern}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-repl_user}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-repl_pass}
      POSTGRES_REPLICATION_SLOT: ${POSTGRES_REPLICATION_SLOT:-fern_replica_slot}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${POSTGRES_REPLICA_PORT:-5433}:5432"
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
      - ./postgres/replica/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/replica/setup-replica.sh:/usr/local/bin/setup-replica.sh:ro
    entrypoint: ["/usr/local/bin/setup-replica.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-fern} -d ${POSTGRES_DB:-fern} >/dev/null 2>&1 && psql -U ${POSTGRES_USER:-fern} -d ${POSTGRES_DB:-fern} -Atqc \"SELECT CASE WHEN pg_is_in_recovery() AND COALESCE((SELECT status FROM pg_stat_wal_receiver LIMIT 1), 'stopped') = 'streaming' THEN 'streaming' ELSE 'not-streaming' END\" | grep '^streaming$' >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 12
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "127.0.0.1:${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 8

  master-node:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.spring-service
      args:
        MODULE_PATH: services/master-node
    restart: unless-stopped
    environment: &service-env
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fern}
      DB_REPLICA_URL: jdbc:postgresql://postgres-replica:5432/${POSTGRES_DB:-fern}
      POSTGRES_USER: ${POSTGRES_USER:-fern}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fern}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP: kafka:29092
      MASTER_NODE_URL: http://master-node:8082
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-dorabets_session}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-Lax}
      WORKER_ID: ${WORKER_ID:-1}
      SERVER_PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "127.0.0.1:${MASTER_NODE_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep UP >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.gateway
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP: kafka:9092
      MASTER_NODE_URL: http://master-node:8082
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN must be set}
      AUTH_SERVICE_URL: http://auth-service:8081
      ORG_SERVICE_URL: http://org-service:8083
      HR_SERVICE_URL: http://hr-service:8084
      PRODUCT_SERVICE_URL: http://product-service:8085
      PROCUREMENT_SERVICE_URL: http://procurement-service:8086
      SALES_SERVICE_URL: http://sales-service:8087
      INVENTORY_SERVICE_URL: http://inventory-service:8088
      PAYROLL_SERVICE_URL: http://payroll-service:8089
      FINANCE_SERVICE_URL: http://finance-service:8090
      AUDIT_SERVICE_URL: http://audit-service:8091
      REPORT_SERVICE_URL: http://report-service:8092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-dorabets_session}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-Lax}
      PORT: 8080
    depends_on:
      master-node:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${GATEWAY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.spring-service
      args:
        MODULE_PATH: services/auth-service/spring
    restart: unless-stopped
    environment:
      <<: *service-env
      SERVER_PORT: 8081
    depends_on:
      master-node:
