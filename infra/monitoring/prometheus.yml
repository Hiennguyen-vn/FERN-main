global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: master-node
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['master-node:8082']

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: org-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['org-service:8083']

  - job_name: hr-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['hr-service:8084']

  - job_name: product-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['product-service:8085']

  - job_name: procurement-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['procurement-service:8086']

  - job_name: sales-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['sales-service:8087']

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['inventory-service:8088']

  - job_name: payroll-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['payroll-service:8089']

  - job_name: finance-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['finance-service:8090']

  - job_name: audit-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['audit-service:8091']

  - job_name: report-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['report-service:8092']
